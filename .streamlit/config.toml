[theme]
base                   = "light"
primaryColor           = "#1a2fff"
backgroundColor        = "#f5f7ff"
secondaryBackgroundColor = "#ffffff"
textColor              = "#1a1f3c"
font                   = "sans serif"

[server]
headless             = true
enableCORS           = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
